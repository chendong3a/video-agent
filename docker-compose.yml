version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: video-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-agent-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_GROUP_ID=${MINIMAX_GROUP_ID}
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./storage:/app/storage
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-agent-celery
    command: celery -A celery_app worker --loglevel=info --pool=solo
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_GROUP_ID=${MINIMAX_GROUP_ID}
    volumes:
      - ./backend:/app
      - ./models:/app/models
      - ./storage:/app/storage
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  redis_data:
